name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate template compatibility
        run: npm run test:templates

      - name: Build application
        run: npm run build
